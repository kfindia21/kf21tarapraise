<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 Tara Mantra Counter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f557;
    --accent-dim: #a8d43a;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --danger: #ff5c5c;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* subtle dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #2e2e2e 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .dot.live {
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,245,87,0.15);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(200,245,87,0.15); }
    50% { box-shadow: 0 0 0 6px rgba(200,245,87,0.05); }
  }

  /* Main counter card */
  .counter-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 48px 32px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .counter-card::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(200,245,87,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .counter-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
  }

  .counter-number {
    font-family: 'DM Mono', monospace;
    font-size: clamp(72px, 20vw, 120px);
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.04em;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s;
    display: inline-block;
  }

  .counter-number.bump {
    transform: scale(1.06);
    color: var(--accent);
  }

  .counter-sub {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  /* Plus one button */
  .btn-plus {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius);
    padding: 0;
    height: 64px;
    width: 100%;
    font-size: 28px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: -0.01em;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-plus:hover { background: var(--accent-dim); }
  .btn-plus:active { transform: scale(0.97); }

  .btn-plus .btn-label {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* Bulk entry card */
  .bulk-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .bulk-card label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .bulk-input {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }

  .bulk-input:focus { border-color: var(--accent); }
  .bulk-input::placeholder { color: var(--text-dim); }

  .btn-add {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,245,87,0.05); }
  .btn-add:active { transform: scale(0.97); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { color: var(--accent); border-color: rgba(200,245,87,0.3); }
  .toast.error { color: var(--danger); border-color: rgba(255,92,92,0.3); }

  /* Reset section */
  .reset-section {
    border-top: 0.5px solid var(--border);
    padding-top: 16px;
    margin-top: 4px;
  }

  .reset-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s;
    width: 100%;
    justify-content: center;
  }

  .reset-toggle:hover { color: var(--danger); }

  .reset-panel {
    display: none;
    margin-top: 14px;
    gap: 8px;
    flex-direction: column;
  }

  .reset-panel.open { display: flex; }

  .reset-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .pin-input {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.2em;
  }

  .pin-input:focus { border-color: var(--danger); }
  .pin-input::placeholder { color: var(--text-dim); letter-spacing: 0.02em; }

  .btn-reset {
    background: rgba(255,92,92,0.08);
    border: 0.5px solid rgba(255,92,92,0.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-reset:hover { background: rgba(255,92,92,0.15); }
  .btn-reset:active { transform: scale(0.97); }

  .reset-hint {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    padding: 4px 0;
  }

  /* Loading state */
  .counter-number.loading {
    color: var(--text-dim);
  }

  @keyframes shimmer {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }

  .counter-number.loading { animation: shimmer 1.4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <span class="header-title">21 Tara Praise Counter</span>
    <span class="status-dot">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">connecting...</span>
    </span>
  </div>

  <div class="counter-card">
    <div class="counter-label">Praises completed today</div>
    <div class="counter-number loading" id="counter">–</div>
    <div class="counter-sub" id="last-updated">–</div>
  </div>

  <button class="btn-plus" id="btn-plus" onclick="addOne()" disabled>
    <span style="font-size:26px;line-height:1">+</span>
    <span class="btn-label">Add 1 Praise</span>
  </button>

  <div class="bulk-card">
    <label for="bulk-input">Add bulk</label>
    <input class="bulk-input" id="bulk-input" type="number" min="1" max="9999" placeholder="e.g. 12" />
    <button class="btn-add" onclick="addBulk()">Add</button>
  </div>

  <div class="reset-section">
    <button class="reset-toggle" onclick="toggleReset()">
      <span>⌁</span> Reset counter
    </button>
    <div class="reset-panel" id="reset-panel">
      <div class="reset-row">
        <input class="pin-input" id="pin-input" type="password" maxlength="8" placeholder="Enter admin PIN" />
        <button class="btn-reset" onclick="resetCounter()">Reset to 0</button>
      </div>
      <div class="reset-hint">Admin only — enter the PIN to reset the daily counter</div>
    </div>
  </div>

</div>

<div class="footer">kf-21tara · live sync</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, runTransaction, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─── CONFIG ────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDEgvopy6DethtC8PRNNoQDyJRRYHStBW0",
    authDomain: "kf-21tara.firebaseapp.com",
    projectId: "kf-21tara",
    storageBucket: "kf-21tara.firebasestorage.app",
    messagingSenderId: "687399754513",
    appId: "1:687399754513:web:1e987eedce2f2c798b8ab0"
  };

  // ─── CHANGE THIS PIN ────────────────────────────────────
  const RESET_PIN = "18061961";
  // ───────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const counterRef = doc(db, "counter", "main");

  // Live listener
  onSnapshot(counterRef, (snap) => {
    const el = document.getElementById('counter');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const btn = document.getElementById('btn-plus');

    el.classList.remove('loading');
    dot.classList.add('live');
    statusText.textContent = 'live';
    btn.disabled = false;

    if (snap.exists()) {
      const count = snap.data().count || 0;
      el.textContent = count.toLocaleString();
      const updated = snap.data().updatedAt?.toDate?.();
      document.getElementById('last-updated').textContent = updated
        ? 'last update: ' + updated.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : 'no updates yet';
    } else {
      el.textContent = '0';
      document.getElementById('last-updated').textContent = 'no updates yet';
      // Create doc if doesn't exist
      setDoc(counterRef, { count: 0 });
    }
  }, (err) => {
    document.getElementById('status-text').textContent = 'offline';
    showToast('Connection error — check your internet', 'error');
  });

  // Add 1
  window.addOne = async function() {
    const el = document.getElementById('counter');
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
    try {
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(counterRef);
        const cur = snap.exists() ? (snap.data().count || 0) : 0;
        tx.set(counterRef, { count: cur + 1, updatedAt: new Date() });
      });
    } catch(e) {
      showToast('Could not update — try again', 'error');
    }
  };

  // Add bulk
  window.addBulk = async function() {
    const input = document.getElementById('bulk-input');
    const val = parseInt(input.value, 10);
    if (!val || val < 1 || val > 9999) {
      showToast('Enter a number between 1 and 9999', 'error');
      return;
    }
    try {
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(counterRef);
        const cur = snap.exists() ? (snap.data().count || 0) : 0;
        tx.set(counterRef, { count: cur + val, updatedAt: new Date() });
      });
      showToast('+' + val + ' praises added', 'success');
      input.value = '';
    } catch(e) {
      showToast('Could not update — try again', 'error');
    }
  };

  // Reset
  window.resetCounter = async function() {
    const pin = document.getElementById('pin-input').value;
    if (pin !== RESET_PIN) {
      showToast('Incorrect PIN', 'error');
      document.getElementById('pin-input').value = '';
      return;
    }
    try {
      await setDoc(counterRef, { count: 0, updatedAt: new Date() });
      showToast('Counter reset to 0', 'success');
      document.getElementById('pin-input').value = '';
      document.getElementById('reset-panel').classList.remove('open');
    } catch(e) {
      showToast('Could not reset — try again', 'error');
    }
  };

  // Toggle reset panel
  window.toggleReset = function() {
    document.getElementById('reset-panel').classList.toggle('open');
  };

  // Allow Enter key on bulk input
  document.getElementById('bulk-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.addBulk();
  });

  // Allow Enter key on PIN input
  document.getElementById('pin-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.resetCounter();
  });

  // Toast helper
  window.showToast = function(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 2800);
  };
</script>

</body>
</html>
